<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="description" content="Maqra is a one-screen Quran reader for GitHub Pages with moving translation, downloads and local offline cache."><meta property="og:title" content="Maqra — Quran Reader"><meta property="og:description" content="A simple one-screen Quran reader."><meta property="og:url" content="https://imranshiundu.github.io/maqra/"><meta name="theme-color" content="#ffffff"><link rel="preconnect" href="https://api.alquran.cloud"><link rel="preconnect" href="https://raw.githubusercontent.com"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"><link rel="shortcut icon" href="assist/quran.png" type="image/x-icon"><link rel="manifest" href="manifest.webmanifest"><link rel="stylesheet" href="styles.css"><title>Maqra — Quran Reader</title></head><body data-page="reader" data-view="parallel"><main class="screen-reader"><header class="topbar"><a class="wordmark" href="./">Maqra</a><nav class="site-nav" aria-label="Main navigation"><a class="active" href="./">Reader</a><a href="search.html">Search</a><a href="library.html">Library</a><a href="notes.html">Notes</a></nav></header><section class="reader-layout"><aside class="reader-controls"><p class="kicker">Reader</p><label>Surah<select id="surah-list"></select></label><label>Translation<select id="translation-list"></select></label><label>View<select id="view-mode"><option value="parallel">Arabic + translation</option><option value="arabic">Arabic only</option><option value="translation">Translation only</option></select></label><div class="actions"><button id="prev-ayah" type="button">Previous</button><button id="next-ayah" type="button">Next</button><button id="font-minus" type="button">A−</button><button id="font-plus" type="button">A+</button></div><div class="actions"><button id="bookmark-surah" type="button">Bookmark</button><button id="save-progress" type="button">Save</button><button id="continue-reading" type="button">Continue</button></div><div class="actions stack"><button id="download-surah" type="button">Download selected Surah</button><button id="download-quran" type="button">Download whole Quran text</button><button id="cache-surah" type="button">Save this Surah offline</button><button id="cache-quran-audio" type="button">Cache Quran audio locally</button></div><p id="status-text" class="status">Starting Maqra...</p></aside><section class="stage"><div class="surah-meta"><p id="revelation-type" class="kicker">Loading</p><h1 id="surah-title">Maqra Reader</h1><p id="surah-subtitle" class="muted">Preparing reader.</p></div><div id="subtitle-stage" class="subtitle-stage"><p id="current-ayah-ref" class="ayah-ref">—</p><p id="current-arabic" class="current-arabic"></p><p id="current-translation" class="current-translation"></p></div><div id="loading" class="loading">Loading Quran text...</div><div class="progress-track"><input id="ayah-range" type="range" min="1" max="1" value="1"><span id="ayah-count">1 / 1</span></div><div class="audio-row"><div><strong id="audio-title">Surah Audio</strong><span id="audio-meta">Audio drives the moving ayah view.</span></div><audio id="audio-player" controls preload="metadata"></audio></div></section></section></main><template id="ayah-template"><article class="ayah-card"><div class="ayah-topline"><span class="ayah-number"></span><span class="ayah-actions"><button class="copy-ayah" type="button">Copy</button><button class="jump-progress" type="button">Mark</button></span></div><p class="arabic-text"></p><p class="translation-text"></p></article></template><script src="js/main.js"></script></body></html>
