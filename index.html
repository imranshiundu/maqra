<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Maqra is a Quran reading and listening platform with translations, recitation audio, search, bookmarks, and reading progress.">
  <meta name="keywords" content="Quran, Maqra, Holy Quran, Quran online, Quran translations, Quran audio">
  <meta name="author" content="Imran Shiundu">
  <meta property="og:title" content="Maqra">
  <meta property="og:description" content="Read, listen, search, bookmark, and continue Quran recitation with Maqra.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  <link rel="shortcut icon" href="assist/quran.png" type="image/x-icon">
  <title>Maqra</title>
  <style>
    body { font-family: Rubik, system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #1db954; }
    #quran { overflow-y: auto; max-height: 56vh; }
    .audio-player { border-radius: 10px; background-color: transparent; border: 1px solid #444; }
  </style>
</head>
<body class="flex flex-col min-h-screen bg-gray-950 text-white">
  <header class="bg-gray-900 py-6 shadow-lg border-b border-gray-800">
    <div class="container mx-auto flex flex-col justify-center items-center px-6 text-center">
      <h1 class="text-4xl font-bold text-white mb-2">Maqra</h1>
      <p class="text-lg text-gray-300 italic">Explore, recite, understand, reflect, connect.</p>
      <p id="status" class="mt-3 text-sm text-gray-400">Starting Maqra...</p>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto p-6 pb-40">
    <section class="bg-gray-900 p-6 rounded-2xl shadow-md mb-6 border border-gray-800">
      <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
        <div class="bg-gray-800 p-4 rounded-xl shadow-sm lg:col-span-1">
          <label class="block text-lg font-semibold mb-2" for="surah-list">Select Surah</label>
          <select id="surah-list" class="w-full p-3 bg-gray-700 text-white rounded-md focus:outline-none focus:ring-2 focus:ring-emerald-500"></select>
        </div>

        <div class="bg-gray-800 p-4 rounded-xl shadow-sm lg:col-span-1">
          <label class="block text-lg font-semibold mb-2" for="language">Translation</label>
          <select id="language" class="w-full p-3 bg-gray-700 text-white rounded-md focus:outline-none focus:ring-2 focus:ring-emerald-500">
            <option value="arabic">Arabic</option>
            <option value="english">English</option>
            <option value="swahili">Swahili</option>
          </select>
        </div>

        <div class="bg-gray-800 p-4 rounded-xl shadow-sm lg:col-span-2">
          <label class="block text-lg font-semibold mb-2" for="search-input">Search ayahs</label>
          <div class="flex gap-2">
            <input id="search-input" class="flex-1 p-3 bg-gray-700 text-white rounded-md focus:outline-none focus:ring-2 focus:ring-emerald-500" placeholder="Search text in selected language...">
            <button id="search-button" class="px-5 py-3 rounded-md bg-emerald-600 hover:bg-emerald-500 font-semibold">Search</button>
          </div>
        </div>
      </div>
    </section>

    <section id="search-results-wrap" class="hidden bg-gray-900 p-6 rounded-2xl shadow-md mb-6 border border-gray-800">
      <div class="flex items-center justify-between gap-4 mb-4">
        <h2 class="text-2xl font-bold">Search Results</h2>
        <button id="clear-search" class="text-sm text-gray-300 hover:text-white">Clear</button>
      </div>
      <div id="search-results" class="space-y-3"></div>
    </section>

    <section class="bg-gray-900 p-6 rounded-2xl shadow-md border border-gray-800">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-4">
        <div>
          <h2 id="surah-title" class="text-2xl font-bold">Surah</h2>
          <p id="surah-meta" class="text-gray-400 text-sm"></p>
        </div>
        <div class="flex gap-2">
          <button id="save-progress" class="px-4 py-2 rounded-md bg-gray-800 hover:bg-gray-700 border border-gray-700">Save progress</button>
          <button id="bookmark-surah" class="px-4 py-2 rounded-md bg-gray-800 hover:bg-gray-700 border border-gray-700">Bookmark</button>
        </div>
      </div>
      <div id="quran" class="text-lg leading-relaxed pr-2"></div>
    </section>
  </main>

  <footer class="bg-gray-900 py-4 shadow-lg fixed bottom-0 w-full border-t border-gray-800">
    <div class="container mx-auto px-4">
      <div class="w-full mx-auto flex flex-col justify-center items-center">
        <h1 class="font-bold text-lg mb-2 text-white">Surah Audio</h1>
        <div id="audio-loading" class="hidden text-gray-400 mb-2">Loading Surah...</div>
        <audio id="audio-player" class="audio-player w-full sm:w-3/4 md:w-2/3 lg:w-1/2 xl:w-1/3" controls></audio>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
